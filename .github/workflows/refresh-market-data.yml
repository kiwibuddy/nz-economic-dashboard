name: Refresh dashboard data

on:
  schedule:
    - cron: "30 19 * * 1-5"   # ~07:30 NZ time, weekdays
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: refresh-market-data
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Fetch latest market data
        run: python3 fetch_data.py
      - name: Commit and push if data changed
        run: |
          if [ -z "$(git status --porcelain data/market-data.js)" ]; then
            echo "No change in market data."; exit 0
          fi
          git config user.name  "market-data-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/market-data.js
          git commit -m "chore: refresh market data $(date -u +%Y-%m-%dT%H:%MZ)"
          # Rebase onto whatever is already on main (e.g. a Pages commit) before
          # pushing, and retry so a concurrent push never fails the run.
          for i in 1 2 3 4 5; do
            git pull --rebase --autostash origin main && \
            git push origin HEAD:main && { echo "pushed"; exit 0; }
            echo "push attempt $i failed; retrying…"; sleep 3
          done
          echo "push failed after retries"; exit 1
